version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sakhi_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-sakhi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sakhi_secure_pwd_2024}
      POSTGRES_DB: ${DB_NAME:-sakhi_safe}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sakhi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sakhi_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sakhi_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sakhi_network
    restart: unless-stopped

  # Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sakhi_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-sakhi}
      DB_PASSWORD: ${DB_PASSWORD:-sakhi_secure_pwd_2024}
      DB_NAME: ${DB_NAME:-sakhi_safe}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS}
      ML_ENGINE_URL: http://ml_engine:5000
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - sakhi_network
    restart: unless-stopped
    command: npm run dev

  # Python ML Engine
  ml_engine:
    build:
      context: ./ml_engine
      dockerfile: Dockerfile
    container_name: sakhi_ml
    environment:
      REDIS_URL: redis://redis:6379
      FLASK_ENV: ${NODE_ENV:-development}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./ml_engine:/app
    networks:
      - sakhi_network
    restart: unless-stopped
    command: python app.py

volumes:
  postgres_data:
  redis_data:

networks:
  sakhi_network:
    driver: bridge
