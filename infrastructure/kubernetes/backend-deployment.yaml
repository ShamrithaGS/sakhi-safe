apiVersion: apps/v1
kind: Deployment
metadata:
  name: sakhi-safe-backend
  labels:
    app: sakhi-safe
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sakhi-safe
      component: backend
  template:
    metadata:
      labels:
        app: sakhi-safe
        component: backend
    spec:
      containers:
      - name: backend
        image: sakhi-safe-backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: production
        - name: DB_HOST
          value: postgres-service
        - name: REDIS_URL
          value: redis://redis-service:6379
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: sakhi-safe
    component: backend
spec:
  selector:
    app: sakhi-safe
    component: backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
